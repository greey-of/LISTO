<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LISTO - Confirmación de Pedido</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/confirm.css">
</head>
<body class="page page-confirm">

  <nav class="page-nav" style="
    background: linear-gradient(135deg, #1bc15d, #149f4c); 
    box-shadow: 0 4px 15px rgba(20, 159, 76, 0.25); 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    padding: 0.75rem 2rem; 
    position: sticky; 
    top: 0; 
    z-index: 1000;
  ">
    
    <!-- Botón Volver -->
    <a href="menu.html" class="nav-back" style="
      color: #ffffff; 
      text-decoration: none; 
      font-weight: 700; 
      font-size: 0.9rem; 
      background: rgba(255, 255, 255, 0.2); 
      padding: 0.5rem 1.2rem; 
      border-radius: 50px; 
      transition: all 0.2s ease; 
      display: inline-flex; 
      align-items: center; 
      gap: 0.4rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
    " onmouseenter="this.style.background='rgba(255, 255, 255, 0.35)'" 
       onmouseleave="this.style.background='rgba(255, 255, 255, 0.2)'">
      ⬅ Volver
    </a>

    <span class="nav-brand" style="
      color: #ffffff; 
      font-weight: 800; 
      font-size: 1.3rem; 
      letter-spacing: 0.5px; 
      text-transform: uppercase;
    ">
      Estado de tu Pedido
    </span>

    <span id="location-info" style="
      color: #ffffff; 
      font-weight: 700; 
      font-size: 0.9rem; 
      background: rgba(255, 255, 255, 0.2); 
      padding: 0.5rem 1.2rem; 
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    ">
      Ubicación
    </span>
  </nav>

  <main class="page-main confirm-layout">
    <section class="ticket card">
      <div class="card-header">
        <h2 class="ticket-title">PEDIDO <span id="order-number">#LST-0000</span></h2>
        <p class="ticket-sub">Resumen del pedido</p>
      </div>

      <div class="card-body">
        <div class="order-list" id="order-list">
          <!-- Items rendered here -->
        </div>
      </div>

      <div class="card-footer">
        <div class="order-total">
          <span>Total</span>
          <strong id="order-total">$0.00</strong>
        </div>
        <div class="ticket-qr" style="display: flex; flex-direction: column; align-items: center; margin-top: 1.5rem;">
          <span style="font-size: 0.9rem; font-weight: bold; color: #555; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px;">
            Código del pedido
          </span>
          <div id="qr-element"></div>
        </div>
      </div>
    </section>

    <aside class="panel card">
      <div class="panel-body">
        <h3 class="panel-title">¡GRACIAS POR TU COMPRA!</h3>
        <p class="panel-sub">Tu pedido está en preparación.</p>

        <div class="countdown" id="countdown">00:00</div>
        <div class="estimated">Tiempo estimado</div>

        <button id="pickup-btn" class="btn btn-primary btn-block">RECOGER AHORA</button>
      </div>
    </aside>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="js/confirm.js"></script>
</body>
</html>
