<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LISTO - Iniciar Sesión</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="page page-login">

  <div class="login-card card">
    <div class="login-header">
      <h1 class="site-title">LISTO</h1>
      <p class="site-subtitle">Si eres LISTO pide por LISTO</p>
    </div>

    <form action="edificios.html" method="GET" class="login-form">
      <div class="field-group">
        <label class="form-label">Nombre de usuario o Boleta</label>
        <input type="text" required placeholder="Ej. 2026600001" class="form-input">
      </div>

      <div class="field-group">
        <label class="form-label">Contraseña</label>
        <input type="password" required placeholder="••••••••" class="form-input">
      </div>

      <button type="submit" class="btn btn-primary btn-block">
        ENTRAR
      </button>
    </form>

    <a href="registro.html" class="btn btn-secondary btn-block">Registrarse</a>

    <div class="form-footer">
      <a href="#" class="link-muted">¿Olvidaste tu contraseña?</a>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
