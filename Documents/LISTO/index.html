<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LISTO - Iniciar Sesión</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md border-t-8 border-[#4CAF50]">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-black text-[#4CAF50] tracking-wide">LISTO</h1>
      <p class="text-sm text-gray-500 mt-1">Si eres LISTO pide por LISTO</p>
    </div>

    <form action="edificios.html" method="GET" class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Nombre de usuario o Boleta</label>
        <input type="text" required placeholder="Ej. 2026600001" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:border-[#4CAF50]">
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Contraseña</label>
        <input type="password" required placeholder="••••••••" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:border-[#4CAF50]">
      </div>

      <button type="submit" class="w-full bg-[#4CAF50] hover:bg-green-600 text-white font-bold py-3 px-4 rounded-xl transition-colors shadow-sm">
        ENTRAR / REGISTRARSE
      </button>
    </form>

    <div class="text-center mt-6">
      <a href="#" class="text-xs text-gray-400 hover:underline">¿Olvidastetu contraseña?</a>
    </div>
  </div>

</body>
</html>
