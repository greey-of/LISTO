<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LISTO - Menú Cafetería</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/menu.css">
</head>
<body class="page page-menu">

  <nav class="page-nav">
    <a href="edificios.html" class="nav-back">⬅ Volver</a>
    <span class="nav-brand">LISTO</span>
    <span class="nav-info" id="location-info">Ubicación: No seleccionada</span>
  </nav>

  <main class="page-main menu-layout">
    <section class="menu-list">
      <h2 class="section-title">Menú Disponible</h2>

      <div class="menu-grid">
        <article class="product-card card">
          <div class="product-info">
            <h4>Chilaquiles con Pollo</h4>
            <p>Con crema, queso y frijoles.</p>
            <span>$45.00</span>
          </div>
          <button data-name="Chilaquiles con Pollo" data-price="45.00" class="btn btn-primary add-to-cart">+</button>
        </article>

        <article class="product-card card">
          <div class="product-info">
            <h4>Café Americano</h4>
            <p>Caliente, tamaño grande 400ml.</p>
            <span>$18.00</span>
          </div>
          <button data-name="Café Americano" data-price="18.00" class="btn btn-primary add-to-cart">+</button>
        </article>
      </div>
    </section>

    <aside class="order-summary card">
      <h3 class="summary-title">Tu Pedido</h3>
      <div class="cart-items" id="cart-items">
        <div>
          <span>1x Chilaquiles con Pollo</span>
          <span>$45.00</span>
        </div>
        <div>
          <span>1x Café Americano</span>
          <span>$18.00</span>
        </div>
      </div>

      <div class="summary-total">
        <span>Total:</span>
        <span id="cart-total">$63.00</span>
      </div>

      <button id="checkout-button" class="btn btn-secondary btn-block">
        Proceder al Pago en Línea
      </button>
    </aside>

  </main>
  <script src="js/app.js"></script>
</body>
</html>
