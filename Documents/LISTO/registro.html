<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LISTO - Registro</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="page page-login">

  <div class="login-card card">
    <div class="login-header">
      <h1 class="site-title">Registro</h1>
      <p class="site-subtitle">Crea tu cuenta y empieza a pedir con LISTO.</p>
    </div>

    <form action="edificios.html" method="GET" class="register-form">
      <div class="field-group">
        <label class="form-label">Nombre</label>
        <input type="text" required placeholder="Ej. Juan Pérez" class="form-input">
      </div>

      <div class="field-group">
        <label class="form-label">Número de boleta</label>
        <input type="text" required placeholder="Ej. 2026600001" class="form-input">
      </div>

      <div class="field-group">
        <label class="form-label">Carrera</label>
        <input type="text" required placeholder="Ej. Ingeniería" class="form-input">
      </div>

      <div class="field-group">
        <label class="form-label">Correo</label>
        <input type="email" required placeholder="ejemplo@ejemplo.com" class="form-input">
      </div>

      <div class="field-group">
        <label class="form-label">Contraseña</label>
        <input type="password" required placeholder="••••••••" class="form-input">
      </div>

      <button type="submit" class="btn btn-primary btn-block">Registrar</button>
      <a href="index.html" class="btn btn-secondary btn-block">Volver al inicio</a>
    </form>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
